name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build release
        run: swift build -c release

      - name: Create app bundle
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          APP_DIR="dist/Sync My Footages.app"

          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"

          cp .build/release/RsyncMyFootages "${APP_DIR}/Contents/MacOS/"

          cat > "${APP_DIR}/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>Sync My Footages</string>
              <key>CFBundleDisplayName</key>
              <string>Sync My Footages</string>
              <key>CFBundleIdentifier</key>
              <string>com.akram.sync-my-footages</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleExecutable</key>
              <string>RsyncMyFootages</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>LSMinimumSystemVersion</key>
              <string>15.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSAppleEventsUsageDescription</key>
              <string>Sync My Footages needs to refresh Finder after syncing files.</string>
          </dict>
          </plist>
          PLIST

          echo -n "APPL????" > "${APP_DIR}/Contents/PkgInfo"

      - name: Code sign
        run: codesign --force --deep --sign - "dist/Sync My Footages.app"

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p dist/dmg
          cp -R "dist/Sync My Footages.app" dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "Sync My Footages" \
            -srcfolder dist/dmg \
            -ov -format UDZO \
            "dist/Sync-My-Footages-${VERSION}.dmg"

      - name: Run tests
        run: swift test

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Sync-My-Footages-*.dmg
          generate_release_notes: true
